<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Bebras CMS</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Bebras <span>CMS</span>
    </div>
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Ingresa tus credenciales para acceder al panel</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" class="form-input" placeholder="admin@bebras.bo" required autocomplete="email" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="login-error" style="color: var(--danger); font-size: 0.8125rem; margin-bottom: 0.75rem; display: none;"></div>
      <button type="submit" class="btn btn-primary" style="width: 100%;" id="login-btn">
        Ingresar
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Error al iniciar sesión');
        }

        // Store user info for the SPA
        localStorage.setItem('cms_user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });

    // If already logged in, redirect
    (async () => {
      try {
        const res = await fetch('/api/auth/me');
        if (res.ok) {
          window.location.href = '/';
        }
      } catch {}
    })();
  </script>
</body>
</html>
